name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          SITE_URL: http://${{ secrets.BLOG_HOST }}:8088
      - name: Configure deployment SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.BLOG_DEPLOY_KEY }}" > ~/.ssh/blog_deploy
          chmod 600 ~/.ssh/blog_deploy
          printf '%s\n' "${{ secrets.BLOG_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
      - name: Publish static site
        timeout-minutes: 3
        run: rsync -az --delete --timeout=60 -e "ssh -i ~/.ssh/blog_deploy -o BatchMode=yes -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=4" dist/ "${{ secrets.BLOG_USER }}@${{ secrets.BLOG_HOST }}:/srv/david-ai-journal/site/"
